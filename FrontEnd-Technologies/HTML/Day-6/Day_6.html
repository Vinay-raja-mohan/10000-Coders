<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tables</title>
</head>

<body>
  <table border="1" style="border-collapse:collapse;" cellpadding="8" width="600" height="300">
    <caption><b>Students Table</b></caption>
    <thead>
      <tr>
        <th>S.No</th>
        <th>Name</th>
        <th>Course</th>
        <th>Year</th>
      </tr>
    </thead>

    <tbody align="center">
      <tr>
        <td>1</td>
        <td>Taraka</td>
        <td>HTML</td>
        <td>2022</td>
      </tr>

      <tr>
        <td>2</td>
        <td>Naga</td>
        <td rowspan=2>CSS</td>
        <td>2023</td>
      </tr>

      <tr>
        <td>3</td>
        <td>Sai</td>
        <td>2024</td>
      </tr>

    </tbody>
  </table>
</body>

</html>
