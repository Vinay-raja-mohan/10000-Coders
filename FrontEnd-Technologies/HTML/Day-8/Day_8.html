<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms Part-2</title>
</head>
<body>
  <center>Forms Part 2</center>
    <form action ="">
      <label for="un">Username: </label>
      <input type="text" id="un" value="vinay"><br><br>

      <label for="pass">Password: </label>
      <input type="password" id="pass"><br><br>

      <label for="em">Email: </label>
      <input type="email" id="em"><br><br>

      <label for="">Number: </label>
      <input type="number"><br><br>

      <label for="">Mobile :</label>
      <input type="tel" value="+91" disabled size="1">
      <input type="tel" placeholder="your number"><br><br>
      <hr>
      <label for="">Fav color: </label>
      <input type="color"><br><br>

      <label for="">Range: </label>
      <input type="range" min="0" max="100" step="20" value="80"><br><br>
      <hr>
      <label for="">Date</label>
      <input type="date"><br><br>

      <label for="">Month: </label>
      <input type="month"><br><br>

      <label for="">Time: </label>
      <input type="time"><br><br>

      <label for="">DateTime: </label>
      <input type="datetime-local"><br><br>
      <hr>
      <label for="gen">Gender: </label>
      <input type="radio" name="gen" id="male">
      <label for="male">Male</label>
      <input type="radio" name="gen" id="fem">
      <label for="fem">Female</label><br><br>

      <label for="lan">Language: </label>
      <input type="checkbox" name="lan">
      <label for="">Hindi</label>
      <input type="checkbox" name="lan">
      <label for="">English</label><br><br>

      <hr>

      <label for="">Select State:</label>
      <select name="" id="">
        <option value="">AP</option>
        <option value="">TS</option>
        <option value="">TN</option>
      </select><br><br>

      <hr>
      <label for="">Address: </label>
      <textarea name="" id="" rows="10" cols="20"></textarea><br><br>

      <hr>

      <fieldset>
        <legend>Personal info: </legend>
        <label for="">Name</label>
        <input type="text"><br><br>
        <label for="">Email: </label>
        <input type="email">
      </fieldset><br><br>

      <hr>
      <input type="submit">
      <input type="reset">

    </form>
  
</body>
</html>
